# https://github.com/BamPeers/rust-ci-github-actions-workflow

name: Test with Code Coverage

on:
  pull_request:
    paths-ignore: ["**.md", "LICENSE*", ".gitignore", ".markdownlint.yml"]
  push:
    branches:
      - main
    paths-ignore: ["**.md", "LICENSE*", ".gitignore", ".markdownlint.yml"]

# Cancel a superseded in-progress run when a new commit lands on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - name: Test
        run: cargo test --workspace --all-features

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage
      - name: Setup just
        uses: extractions/setup-just@v4
      # Prebuilt binary instead of `cargo install cargo-tarpaulin`, which
      # compiles the tool from source on every run.
      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin
      - name: Generate test result and coverage report
        run: just coverage
      - uses: coverallsapp/github-action@v2
        with:
          path-to-lcov: coverage/lcov.info

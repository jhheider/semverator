# https://github.com/BamPeers/rust-ci-github-actions-workflow

name: Release Packaging

# Fires when a GitHub Release is published (the version must already be
# committed in Cargo.toml). Builds the platform binaries, attaches them to the
# release, and publishes the workspace crates to crates.io.
on:
  release:
    types: [published]
  # Manual trigger to (re)build and attach binaries to an existing release,
  # e.g. one cut before this workflow published binaries. Builds from the tag's
  # own code; the crates publish is skipped (dispatch is binaries-only).
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and attach binaries to (e.g. v0.10.1)"
        required: true

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.tag }}

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: semverator-linux-x86_64.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: semverator-linux-aarch64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: semverator-macos-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: semverator-macos-aarch64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: semverator-windows-x86_64.zip
    steps:
      # Build the tag's own code (on dispatch), so attached binaries match the
      # released source; on a real release event this resolves to the tag too.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cross linker for the non-native linux-aarch64 build
      - uses: taiki-e/setup-cross-toolchain-action@v1
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        with:
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release -p semverator --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [[ "${{ matrix.asset_name }}" == *.zip ]]; then
            7z a "$GITHUB_WORKSPACE/${{ matrix.asset_name }}" semverator.exe
          else
            tar czf "$GITHUB_WORKSPACE/${{ matrix.asset_name }}" semverator
          fi

      - name: Attach to release
        shell: bash
        run: gh release upload '${{ github.event.release.tag_name || inputs.tag }}' '${{ matrix.asset_name }}' --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  publish-crates:
    name: Publish to crates.io
    needs: build
    # Only on a real release; a manual dispatch is for binaries, not re-publish.
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      # Publishes workspace crates in dependency order (libsemverator, then
      # semverator), waiting for the index between them.
      - uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  bump-formula:
    name: Refresh the Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Check out the default branch for the current bump script (the release
      # tag may predate it); the script retags URLs and recomputes the shas.
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Refresh the binary formula on the tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/jhheider/homebrew-tap.git" tap
          python3 .github/scripts/bump-tap-formula.py "$TAG" tap/Formula/semverator.rb
          cd tap
          if git diff --quiet; then
            echo "formula already at ${TAG}; nothing to do"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "semverator ${TAG#v}: refresh binary formula"
          git push

on:
  release:
    types: [published]

name: Release

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: semverator
            archive: semverator-linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: semverator
            archive: semverator-linux-aarch64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: semverator
            archive: semverator-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: semverator
            archive: semverator-macos-aarch64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: semverator.exe
            archive: semverator-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build -p semverator --release --target ${{ matrix.target }}
        env:
          RUSTFLAGS: "-D warnings"

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} semverator
          tar czf ${{ matrix.archive }} semverator
          rm semverator

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "semverator.exe"
          Compress-Archive -Path "semverator.exe" -DestinationPath "${{ matrix.archive }}"
          Remove-Item "semverator.exe"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish -p libsemverator --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: cargo publish -p semverator --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
